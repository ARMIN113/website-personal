<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untuk Kamu ❤️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <audio autoplay loop>
        <source src="assets/music/lagu.mp3" type="audio/mpeg">
    </audio>

    <div class="hearts"></div>

    <section class="hero">
        <img src="assets/image/pacar.jpeg" alt="Pacarku">
        <h1>Hai Sayang ❤️</h1>
        <p>Kamu adalah alasan aku tersenyum setiap hari.</p>

        <button onclick="showLove()">
            Klik Aku 💖
        </button>
    </section>

    <section class="message" id="message">
        <h2>Pesan Untuk Kamu</h2>
        <p>
            Terima kasih sudah hadir dalam hidupku.
            Semoga kita selalu bersama dan saling menjaga.
            Aku sayang kamu hari ini, besok, dan seterusnya ❤️
        </p>
    </section>

    <script src="script.js"></script>

</body>
</html>
